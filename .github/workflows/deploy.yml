name: Deploy to EC2

on:
  push:
    branches: [main]

env:
  IMAGE: eduardorcury/investimentos-backend
  AWS_REGION: sa-east-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch Docker Hub credentials from SSM
        id: secrets
        run: |
          echo "dockerhub_username=$(aws ssm get-parameters --region $AWS_REGION \
            --name dockerhub_username --with-decryption \
            --query "Parameters[0].Value" --output text)" >> $GITHUB_OUTPUT
          echo "dockerhub_password=$(aws ssm get-parameters --region $AWS_REGION \
            --name dockerhub_password --with-decryption \
            --query "Parameters[0].Value" --output text)" >> $GITHUB_OUTPUT
          echo "ec2_host=$(aws ssm get-parameters --region $AWS_REGION \
            --name ec2_host --with-decryption \
            --query "Parameters[0].Value" --output text)" >> $GITHUB_OUTPUT
          echo "ec2_user=$(aws ssm get-parameters --region $AWS_REGION \
            --name ec2_user --with-decryption \
            --query "Parameters[0].Value" --output text)" >> $GITHUB_OUTPUT
          echo "ec2_ssh_key<<EOF" >> $GITHUB_OUTPUT
          aws ssm get-parameters --region $AWS_REGION \
            --name ec2_ssh_key --with-decryption \
            --query "Parameters[0].Value" --output text >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.secrets.outputs.dockerhub_username }}
          password: ${{ steps.secrets.outputs.dockerhub_password }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.secrets.outputs.ec2_host }}
          username: ${{ steps.secrets.outputs.ec2_user }}
          key: ${{ steps.secrets.outputs.ec2_ssh_key }}
          script: |
            username=$(aws ssm get-parameters --region sa-east-1 \
              --name dockerhub_username --with-decryption \
              --query "Parameters[0].Value" --output text)
            aws ssm get-parameters --region sa-east-1 \
              --name dockerhub_password --with-decryption \
              --query "Parameters[0].Value" --output text \
              | docker login --username "$username" --password-stdin

            docker stop investimentos-backend 2>/dev/null || true
            docker rm   investimentos-backend 2>/dev/null || true
            docker image ls -aq | xargs --no-run-if-empty docker rmi 2>/dev/null || true

            docker pull eduardorcury/investimentos-backend:latest
            docker run -d \
              --name investimentos-backend \
              --restart unless-stopped \
              --memory 128m \
              --memory-swap 128m \
              -p 8080:8080 \
              eduardorcury/investimentos-backend:latest
