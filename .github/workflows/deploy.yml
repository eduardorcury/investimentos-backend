name: Deploy to EC2

on:
  push:
    branches: [main]

env:
  IMAGE: eduardorcury/investimentos-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            username=$(aws ssm get-parameters --region sa-east-1 \
              --name dockerhub_username --with-decryption \
              --query "Parameters[0].Value" --output text)
            aws ssm get-parameters --region sa-east-1 \
              --name dockerhub_password --with-decryption \
              --query "Parameters[0].Value" --output text \
              | docker login --username "$username" --password-stdin

            docker stop investimentos-backend 2>/dev/null || true
            docker rm   investimentos-backend 2>/dev/null || true
            docker image ls -aq | xargs --no-run-if-empty docker rmi 2>/dev/null || true

            docker pull eduardorcury/investimentos-backend:latest
            docker run -d \
              --name investimentos-backend \
              --restart unless-stopped \
              --memory 128m \
              --memory-swap 128m \
              -p 8080:8080 \
              eduardorcury/investimentos-backend:latest
